services:
  - type: web
    name: johnbryan-backend
    env: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: https://johnbryan-frontend.onrender.com
      - key: COOKIE_SECURE
        value: "true"
      - key: COOKIE_SAMESITE
        value: None
      - key: DB_HOST
        value: sql12.freesqldatabase.com
      - key: DB_PORT
        value: "3306"
      - key: DB_USER
        value: sql12827865
      - key: DB_PASSWORD
        sync: false
      - key: DB_DATABASE
        value: sql12827865
      - key: EMAIL_FROM
        value: no-reply@mailtrap.io
      - key: SMTP_HOST
        value: sandbox.smtp.mailtrap.io
      - key: SMTP_PORT
        value: "2525"
      - key: SMTP_USER
        value: d2aa7fb897cd3a
      - key: SMTP_PASS
        value: a121d0557e1ae8
